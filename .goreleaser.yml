version: 2

project_name: lumina

builds:
  - id: lumina
    main: . # Assuming main.go is in your root
    binary: lumina
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
    ldflags:
      # This injects the git tag version into your code at build time
      - -s -w -X github.com/aliozdemir13/Lumina/cmd.Version={{.Version}}

archives:
  - id: lumina
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'README'